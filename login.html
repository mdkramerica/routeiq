<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Login — RouteIQ</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --border: #2a2a3f;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo .iq { -webkit-text-fill-color: var(--text); }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      padding: 0.9rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 4px 20px rgba(108,99,255,0.3);
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-magic {
      width: 100%;
      background: transparent;
      color: var(--text);
      padding: 0.85rem;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-magic:hover { border-color: var(--accent); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .footer-links {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-links a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-links a:hover { text-decoration: underline; }
    .back-home {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-home a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
    }
    .back-home a:hover { color: var(--text); }
    #magic-form { display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo"><span>Route</span><span class="iq">IQ</span></div>
    <p class="subtitle">Welcome back. Log in to your account.</p>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Log In</button>
      </form>

      <div class="divider">or</div>

      <button class="btn-magic" id="magic-toggle">Send Magic Link instead</button>

      <form id="magic-form">
        <div class="form-group">
          <label for="magic-email">Email</label>
          <input type="email" id="magic-email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <button type="submit" class="btn-primary">Send Magic Link</button>
      </form>
    </div>

    <div class="footer-links">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to RouteIQ</a>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const $error = document.getElementById('error');
    const $success = document.getElementById('success');

    function showError(msg) {
      $error.textContent = msg;
      $error.style.display = 'block';
      $success.style.display = 'none';
    }
    function showSuccess(msg) {
      $success.textContent = msg;
      $success.style.display = 'block';
      $error.style.display = 'none';
    }

    // Toggle magic link form
    document.getElementById('magic-toggle').addEventListener('click', () => {
      const mf = document.getElementById('magic-form');
      const lf = document.getElementById('login-form');
      const toggle = document.getElementById('magic-toggle');
      if (mf.style.display === 'none' || !mf.style.display) {
        mf.style.display = 'block';
        lf.style.display = 'none';
        toggle.textContent = 'Use password instead';
      } else {
        mf.style.display = 'none';
        lf.style.display = 'block';
        toggle.textContent = 'Send Magic Link instead';
      }
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      $error.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('token', data.session.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });

    // Magic Link
    document.getElementById('magic-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API}/api/auth/magic-link`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('magic-email').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to send magic link');
        showSuccess('Magic link sent! Check your email.');
      } catch (err) {
        showError(err.message);
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
