<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Reset Password — RouteIQ</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo"><span>Route</span><span class="iq">IQ</span></div>
    <p class="subtitle" style="margin-bottom:2rem;">Choose a new password for your account.</p>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" id="reset-btn">Reset Password</button>
      </form>
    </div>

    <div class="footer-links">
      <a href="login.html">Back to login</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to RouteIQ</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
