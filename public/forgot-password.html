<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Forgot Password — TerritoryPilot</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo"><span>Territory</span><span class="iq">Pilot</span></div>
    <p class="subtitle" style="margin-bottom:2rem;">Enter your email and we'll send you a reset link.</p>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <button type="submit" class="btn-primary" id="forgot-btn">Send Reset Link</button>
      </form>
    </div>

    <div class="footer-links">
      Remember your password? <a href="login.html">Log in</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to TerritoryPilot</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
