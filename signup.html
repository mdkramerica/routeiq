<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Sign Up — RouteIQ</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --border: #2a2a3f;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo .iq { -webkit-text-fill-color: var(--text); }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
    }
    .trial-badge {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .trial-badge span {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      padding: 0.9rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 4px 20px rgba(108,99,255,0.3);
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .perks {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .perk {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .perk::before {
      content: "\2713";
      color: var(--green);
      font-weight: 700;
      flex-shrink: 0;
    }
    .footer-links {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-links a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-links a:hover { text-decoration: underline; }
    .back-home {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-home a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
    }
    .back-home a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo"><span>Route</span><span class="iq">IQ</span></div>
    <p class="subtitle">Start optimizing your territory today.</p>
    <div class="trial-badge"><span>14-day free trial &middot; No credit card required</span></div>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">Create Free Account</button>
      </form>

      <div class="perks">
        <div class="perk">14 days free — full access</div>
        <div class="perk">No credit card to start</div>
        <div class="perk">Import your accounts in minutes</div>
        <div class="perk">Cancel anytime, no questions</div>
      </div>
    </div>

    <div class="footer-links">
      Already have an account? <a href="login.html">Log in</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to RouteIQ</a>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const $error = document.getElementById('error');

    function showError(msg) {
      $error.textContent = msg;
      $error.style.display = 'block';
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      $error.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        localStorage.setItem('token', data.session.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
